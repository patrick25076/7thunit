<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product - 7th Unit</title>
    <meta name="description" content="Request early access to deploy 7th Unit robots in your operation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Literata:opsz,wght@7..72,300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260522-pages">
    <script src="/assets/js/main.js?v=20260522-pages" defer></script>
</head>
<body>
    <header class="nav" aria-label="Primary navigation">
        <div class="nav__inner">
            <a class="nav__brand" href="/">7TH UNIT</a>
            <button class="nav__toggle" type="button" data-nav-toggle aria-label="Toggle navigation" aria-expanded="false">
                <span class="nav__toggle-bar"></span>
            </button>
            <nav class="nav__panel" data-nav-menu data-open="false">
                <ul class="nav__links">
                    <li><a class="nav__link" href="/product" aria-current="page">Product</a></li>
                    <li><a class="nav__link" href="/os">Unit OS</a></li>
                    <li><a class="nav__link" href="/vision">Vision</a></li>
                    <li><a class="nav__link" href="/careers">Careers</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="lead-form-page lead-form-page--brand" aria-labelledby="product-title">
            <div class="lead-form-page__inner">
                <div class="lead-form-page__mark-row" aria-hidden="true">
                    <span class="pixel-mark"></span>
                    <h1 id="product-title">Deploy our robotic workforce in your operations.</h1>
                    <span class="pixel-mark pixel-mark--right"></span>
                </div>

                <form class="lead-form" data-formspree="https://formspree.io/f/xvzleeyw" data-success-message="Received. We will respond directly.">
                    <input type="hidden" name="_subject" value="7th Unit early access inquiry">
                    <div class="lead-form__row lead-form__row--2col">
                        <label class="lead-field">
                            <span class="lead-field__label">Name</span>
                            <input class="lead-field__input" name="name" autocomplete="name" placeholder="Your Name" required>
                            <span class="field__error" data-error-for="name"></span>
                        </label>
                        <label class="lead-field">
                            <span class="lead-field__label">Email</span>
                            <input class="lead-field__input" type="email" name="email" autocomplete="email" placeholder="you@company.com" required>
                            <span class="field__error" data-error-for="email"></span>
                        </label>
                    </div>
                    <label class="lead-field">
                        <span class="lead-field__label">Company</span>
                        <input class="lead-field__input" name="company" autocomplete="organization" placeholder="Autonomy Inc." required>
                        <span class="field__error" data-error-for="company"></span>
                    </label>
                    <div class="lead-form__row lead-form__row--2col">
                        <label class="lead-field">
                            <span class="lead-field__label">Company Size</span>
                            <select class="lead-field__input lead-field__select" name="company_size" required>
                                <option value="">Select company size</option>
                                <option>1-10</option>
                                <option>11-50</option>
                                <option>51-200</option>
                                <option>201-1,000</option>
                                <option>1,001-5,000</option>
                                <option>5,000+</option>
                            </select>
                            <span class="field__error" data-error-for="company_size"></span>
                        </label>
                        <label class="lead-field">
                            <span class="lead-field__label">Industry</span>
                            <select class="lead-field__input lead-field__select" name="industry" required>
                                <option value="">Select industry</option>
                                <option>Warehousing</option>
                                <option>Logistics</option>
                                <option>Manufacturing</option>
                                <option>Retail operations</option>
                                <option>Food production</option>
                                <option>Other industrial operations</option>
                            </select>
                            <span class="field__error" data-error-for="industry"></span>
                        </label>
                    </div>
                    <label class="lead-field">
                        <span class="lead-field__label">Tell us about your operations/positions you're looking to fill with robots.</span>
                        <textarea class="lead-field__input lead-field__textarea" name="operations" placeholder="Describe what tasks you'd like to automate, positions looking to fill and any additional requirements we should know." required></textarea>
                        <span class="field__error" data-error-for="operations"></span>
                    </label>
                    <div class="lead-form__actions">
                        <p class="form__status lead-form__status" data-status></p>
                        <button class="lead-form__submit" type="submit">Submit Inquiry</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
